name: Genesis Run

# One-shot: run flashlight on all tracked repos that have no artifacts yet.
# Triggers manually via workflow_dispatch.

on:
  workflow_dispatch:
    inputs:
      repo:
        description: "Single repo to analyze (e.g. Layr-Labs/d-inference). Leave empty for all."
        required: false
        default: ""

jobs:
  genesis:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install git+https://github.com/Layr-Labs/github-flashlight.git
          pip install pyyaml --quiet

      - name: Run genesis
        id: genesis
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
          INPUT_REPO: ${{ inputs.repo }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 << 'PYEOF'
          import yaml, json, os, subprocess, sys

          input_repo = os.environ.get("INPUT_REPO", "")

          with open("tracked-repos.yaml") as f:
              data = yaml.safe_load(f)

          repos_to_process = []
          for r in data.get("repos", []):
              repo = r["repo"]
              artifacts_path = r["artifacts_path"]
              manifest_path = os.path.join(artifacts_path, "manifest.json")

              if input_repo and repo != input_repo:
                  continue

              if os.path.exists(manifest_path):
                  print(f"{repo}: already has artifacts, skipping")
                  continue

              # Get HEAD SHA
              result = subprocess.run(
                  ["gh", "api", f"repos/{repo}/commits?per_page=1", "--jq", ".[0].sha"],
                  capture_output=True, text=True
              )
              head_sha = result.stdout.strip()
              if not head_sha:
                  print(f"ERROR: Could not fetch HEAD for {repo}")
                  continue

              repos_to_process.append({
                  "repo": repo,
                  "artifacts_path": artifacts_path,
                  "head_sha": head_sha,
              })
              print(f"{repo}: needs genesis (HEAD {head_sha[:12]})")

          if not repos_to_process:
              print("No repos need genesis. Exiting.")
              with open(os.environ["GITHUB_OUTPUT"], "a") as f:
                  f.write("has_artifacts=false\n")
              sys.exit(0)

          errors = []
          for r in repos_to_process:
              repo = r["repo"]
              artifacts_path = r["artifacts_path"]
              head_sha = r["head_sha"]

              print(f"\n=== Genesis: {repo} @ {head_sha[:12]} ===")
              cmd = [
                  "flashlight",
                  "--repo", f"https://github.com/{repo}.git",
                  "--output", artifacts_path,
                  "--head-sha", head_sha,
                  "--verbose",
              ]
              print(f"Running: {' '.join(cmd)}")
              result = subprocess.run(cmd)
              if result.returncode != 0:
                  print(f"ERROR: flashlight failed for {repo}")
                  errors.append(repo)
              else:
                  print(f"SUCCESS: {repo} artifacts at {artifacts_path}/")

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"has_artifacts={'true' if repos_to_process and not errors else 'false'}\n")

          if errors:
              print(f"\n❌ Failed: {errors}")
              sys.exit(1)
          print(f"\n✅ {len(repos_to_process)} repo(s) processed")
          PYEOF

      - name: Create PR with genesis artifacts
        if: steps.genesis.outputs.has_artifacts == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="flashlight/genesis-run"
          git checkout -b "$BRANCH"
          git add artifacts/
          git config user.name "flashlight-sweep[bot]"
          git config user.email "flashlight-sweep[bot]@users.noreply.github.com"

          if git diff --cached --quiet; then
            echo "No artifacts to commit"
            exit 0
          fi

          git commit -m "chore: genesis knowledge graph artifacts [flashlight-sweep]

          Initial flashlight analysis for all tracked repos."
          git push origin "$BRANCH"

          gh pr create \
            --title "flashlight: genesis knowledge graph" \
            --body "Initial flashlight analysis for all tracked repos that had no prior artifacts.

          Review the generated knowledge graphs and architecture docs before merging." \
            --base main \
            --head "$BRANCH" \
            --label "flashlight-sweep"
