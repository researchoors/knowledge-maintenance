name: Temporal Validation

# Daily validation: re-check stored knowledge artifacts against the current
# codebase to find stale references, missing components, wrong edges, etc.
# Opens a GitHub issue with the validation report if discrepancies are found.

on:
  schedule:
    - cron: "0 8 * * *"  # 08:00 UTC daily
  workflow_dispatch:
    inputs:
      repo:
        description: "Single repo to validate (e.g. Layr-Labs/d-inference). Leave empty to validate all."
        required: false
        default: ""

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -e ".[dev]" --quiet
          pip install git+https://github.com/Layr-Labs/github-flashlight.git

      - name: Run temporal validation
        id: validate
        env:
          INPUT_REPO: ${{ inputs.repo }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PRIVATE_TOKEN: ${{ secrets.FLASHLIGHT_REPO_TOKEN }}
        run: |
          pip install pyyaml --quiet

          python3 << 'PYEOF'
          import yaml, json, os, subprocess, sys
          from pathlib import Path
          from datetime import datetime, timezone

          input_repo = os.environ.get("INPUT_REPO", "")

          with open("tracked-repos.yaml") as f:
              data = yaml.safe_load(f)

          all_reports = []

          for r in data.get("repos", []):
              repo = r["repo"]
              artifacts_path = Path(r["artifacts_path"])
              is_public = r.get("public", False)

              if input_repo and repo != input_repo:
                  continue

              manifest_path = artifacts_path / "manifest.json"
              if not manifest_path.exists():
                  print(f"SKIP {repo}: no manifest.json found at {manifest_path}")
                  continue

              with open(manifest_path) as f:
                  manifest = json.load(f)
              commit_sha = manifest.get("source_commit", "")

              if not commit_sha:
                  print(f"SKIP {repo}: no source_commit in manifest")
                  continue

              # Clone the source repo at the analyzed commit
              clone_dir = Path(f"/tmp/validation-repo")
              if clone_dir.exists():
                  import shutil
                  shutil.rmtree(clone_dir)

              clone_url = f"https://github.com/{repo}.git"
              result = subprocess.run(
                  ["git", "clone", "--filter=blob:none", clone_url, str(clone_dir)],
                  capture_output=True, text=True
              )
              if result.returncode != 0:
                  print(f"SKIP {repo}: clone failed — {result.stderr.strip()}")
                  continue

              # Check out the exact commit
              subprocess.run(
                  ["git", "checkout", commit_sha],
                  cwd=clone_dir, capture_output=True, check=True
              )

              # Run deterministic discovery on the cloned repo for comparison
              sys.path.insert(0, str(Path(".").resolve() / "src"))
              from knowledge_maintenance.temporal_validator import validate

              report = validate(
                  repo_path=clone_dir,
                  artifacts_dir=artifacts_path,
                  commit_sha=commit_sha,
              )

              report_data = json.loads(report.model_dump_json())
              all_reports.append({
                  "repo": repo,
                  "commit_sha": commit_sha,
                  "is_valid": report.is_valid,
                  "discrepancy_count": len(report.discrepancies),
                  "discrepancies": report_data["discrepancies"],
              })

              status = "✅ VALID" if report.is_valid else f"❌ {len(report.discrepancies)} DISCREPANCY(IES)"
              print(f"{repo}@{commit_sha[:12]}: {status}")
              for d in report.discrepancies:
                  print(f"  [{d.severity}] {d.kind}: {d.description}")

          # Write summary for next step
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              total_discrepancies = sum(r["discrepancy_count"] for r in all_reports)
              f.write(f"total_discrepancies={total_discrepancies}\n")
              f.write(f"report_count={len(all_reports)}\n")

          # Save full report
          with open("/tmp/validation_report.json", "w") as f:
              json.dump(all_reports, f, indent=2)
          PYEOF

      - name: Create issue if discrepancies found
        if: steps.validate.outputs.total_discrepancies > 0
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 << 'PYEOF'
          import json, subprocess

          with open("/tmp/validation_report.json") as f:
              reports = json.load(f)

          total = sum(r["discrepancy_count"] for r in reports)
          title = f"🔍 Temporal validation: {total} discrepancy(ies) found"

          body_parts = [
              f"**Daily temporal validation found {total} discrepancy(ies).**\n",
              f"Checked at: {reports[0]['commit_sha'] if reports else 'N/A'}\n",
          ]

          for report in reports:
              if report["is_valid"]:
                  continue
              body_parts.append(f"\n## {report['repo']}@{report['commit_sha'][:12]}")
              body_parts.append(f"**{report['discrepancy_count']} discrepancies:**\n")
              for d in report["discrepancies"]:
                  body_parts.append(f"- **[{d['severity']}]** `{d['kind']}`: {d['description']} _({d['location']})_")

          body = "\n".join(body_parts)

          # Check if there's an open issue with the same title prefix
          result = subprocess.run(
              ["gh", "issue", "list", "--label", "temporal-validation", "--state", "open", "--limit", "1", "--json", "number"],
              capture_output=True, text=True
          )
          existing = json.loads(result.stdout) if result.stdout.strip() else []

          if existing:
              # Update existing issue
              issue_num = existing[0]["number"]
              subprocess.run(
                  ["gh", "issue", "comment", str(issue_num), "--body", body],
                  check=True
              )
              print(f"Updated issue #{issue_num}")
          else:
              # Create new issue
              subprocess.run(
                  ["gh", "issue", "create",
                   "--title", title,
                   "--body", body,
                   "--label", "temporal-validation"],
                  check=True
              )
              print("Created new issue")
          PYEOF

      - name: Validation passed
        if: steps.validate.outputs.total_discrepancies == 0
        run: echo "✅ All knowledge artifacts are valid — no discrepancies found."
